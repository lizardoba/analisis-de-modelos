<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacientes Dexie App</title>
  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.js"></script>
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface-2: #f2efe9;
      --text: #201d18;
      --muted: #6d6b66;
      --border: #d8d2c8;
      --primary: #01696f;
      --primary-dark: #0c4e54;
      --sidebar: #16363a;
      --sidebar-soft: rgba(255, 255, 255, 0.08);
      --sidebar-border: rgba(255, 255, 255, 0.12);
      --shadow: 0 12px 30px rgba(14, 30, 37, 0.08);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color: var(--text);
    }

    button, input, textarea, select {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 290px 1fr;
    }

    .sidebar {
      padding: 24px;
      background: var(--sidebar);
      color: #eef7f5;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .logo-mark {
      width: 52px;
      color: #89d0cb;
      flex-shrink: 0;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      opacity: 0.8;
      margin: 0 0 6px;
    }

    .eyebrow.teal {
      color: var(--primary);
      opacity: 1;
    }

    .sidebar h1, .topbar h2, .panel h3 {
      margin: 0;
    }

    .sidebar-copy {
      color: #cfe6e3;
      line-height: 1.6;
      margin: 0;
    }

    .side-card {
      background: var(--sidebar-soft);
      border: 1px solid var(--sidebar-border);
      border-radius: 18px;
      padding: 16px;
    }

    .side-card span {
      display: block;
      font-size: 14px;
      color: #d4efeb;
    }

    .side-card strong {
      display: block;
      font-size: 28px;
      margin-top: 8px;
    }

    .main {
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .topbar h2 {
      font-size: 32px;
    }

    .grid {
      display: grid;
      gap: 20px;
      margin-bottom: 20px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      margin-bottom: 16px;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(1, 105, 111, 0.12);
    }

    textarea {
      resize: vertical;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn.full {
      width: 100%;
    }

    .btn.primary {
      background: var(--primary);
      color: white;
    }

    .btn.primary:hover {
      background: var(--primary-dark);
    }

    .btn.secondary {
      background: #e5f0ef;
      color: var(--primary-dark);
    }

    .btn.secondary:hover {
      opacity: 0.92;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .item-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      background: #fff;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .item-card p {
      margin: 8px 0 0;
      color: #3e3b36;
      line-height: 1.5;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #e8f4f3;
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      margin: 0;
    }

    .code-panel pre {
      margin: 0;
      background: #141414;
      color: #def7f3;
      padding: 18px;
      border-radius: 16px;
      overflow: auto;
    }

    .code-panel code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .grid.two {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .main {
        padding: 18px;
      }

      .topbar h2 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const db = new Dexie('PacientesDB');

    db.version(1).stores({
      pacientes: '++id,nombre,edad',
      discrepancias: '++id,pacienteId,fechaAnalisis'
    });

    const app = document.querySelector('#app');

    const state = {
      pacientes: [],
      discrepancias: []
    };

    function logo() {
      return `
        <svg viewBox="0 0 64 64" aria-label="Logo clínica" role="img" class="logo-mark">
          <rect x="8" y="8" width="48" height="48" rx="16" stroke="currentColor" stroke-width="4" fill="none"></rect>
          <path d="M22 32h20M32 22v20" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
          <circle cx="46" cy="18" r="4" fill="currentColor"></circle>
        </svg>
      `;
    }

    function renderApp() {
      app.innerHTML = `
        <div class="shell">
          <aside class="sidebar">
            <div class="brand">
              ${logo()}
              <div>
                <p class="eyebrow">HTML + Dexie.js</p>
                <h1>Pacientes</h1>
              </div>
            </div>

            <p class="sidebar-copy">
              Aplicación en un solo HTML. Los datos se guardan en IndexedDB
              y permanecen aunque recargues la página.
            </p>

            <div class="side-card">
              <span>Total pacientes</span>
              <strong id="count-pacientes">0</strong>
            </div>

            <div class="side-card">
              <span>Total análisis</span>
              <strong id="count-analisis">0</strong>
            </div>

            <button id="seedBtn" class="btn secondary full">
              Insertar datos de ejemplo
            </button>
          </aside>

          <main class="main">
            <header class="topbar">
              <div>
                <p class="eyebrow teal">Archivo único para GitHub</p>
                <h2>Gestión local de pacientes</h2>
              </div>
            </header>

            <section class="grid two">
              <article class="panel">
                <div class="panel-head">
                  <h3>Nuevo paciente</h3>
                  <p>Tabla: pacientes</p>
                </div>

                <form id="patientForm" class="form">
                  <label>
                    Nombre
                    <input
                      name="nombre"
                      type="text"
                      required
                      placeholder="Ej. Ana Torres"
                    />
                  </label>

                  <label>
                    Edad
                    <input
                      name="edad"
                      type="number"
                      min="0"
                      required
                      placeholder="Ej. 28"
                    />
                  </label>

                  <label>
                    Historial médico
                    <textarea
                      name="historialMedico"
                      rows="4"
                      placeholder="Alergias, antecedentes, observaciones"
                    ></textarea>
                  </label>

                  <button type="submit" class="btn primary">
                    Guardar paciente
                  </button>
                </form>
              </article>

              <article class="panel">
                <div class="panel-head">
                  <h3>Nuevo análisis de discrepancia</h3>
                  <p>Tabla: discrepancias</p>
                </div>

                <form id="analysisForm" class="form">
                  <label>
                    Paciente
                    <select name="pacienteId" id="pacienteSelect" required>
                      <option value="">Selecciona un paciente</option>
                    </select>
                  </label>

                  <label>
                    Fecha del análisis
                    <input
                      name="fechaAnalisis"
                      type="date"
                      required
                    />
                  </label>

                  <label>
                    Medidas
                    <textarea
                      name="medidas"
                      rows="3"
                      placeholder='Ej. {"superior": 92.4, "inferior": 88.1}'
                    ></textarea>
                  </label>

                  <label>
                    Resultados
                    <textarea
                      name="resultados"
                      rows="4"
                      placeholder="Resumen clínico de la discrepancia"
                    ></textarea>
                  </label>

                  <button type="submit" class="btn primary">
                    Guardar análisis
                  </button>
                </form>
              </article>
            </section>

            <section class="grid two">
              <article class="panel">
                <div class="panel-head">
                  <h3>Pacientes guardados</h3>
                  <p>Persistencia local con Dexie.js</p>
                </div>
                <div id="patientsList" class="list"></div>
              </article>

              <article class="panel">
                <div class="panel-head">
                  <h3>Análisis registrados</h3>
                  <p>Relacionados por pacienteId</p>
                </div>
                <div id="analysisList" class="list"></div>
              </article>
            </section>

            <section class="panel code-panel">
              <div class="panel-head">
                <h3>Previsualización del código base</h3>
                <p>Creación de tablas e inserción de registros</p>
              </div>

<pre><code>const db = new Dexie('PacientesDB');

db.version(1).stores({
  pacientes: '++id,nombre,edad',
  discrepancias: '++id,pacienteId,fechaAnalisis'
});

await db.pacientes.add({
  nombre: 'Ana Torres',
  edad: 28,
  historialMedico: 'Sin alergias reportadas'
});

await db.discrepancias.add({
  pacienteId: 1,
  fechaAnalisis: '2026-04-17',
  medidas: '{"superior": 91.2, "inferior": 87.6}',
  resultados: 'Discrepancia leve en arcada superior'
});</code></pre>
            </section>
          </main>
        </div>
      `;

      bindEvents();
    }

    function patientCard(patient) {
      return `
        <article class="item-card">
          <div class="item-top">
            <strong>${escapeHtml(patient.nombre)}</strong>
            <span class="badge">ID ${patient.id}</span>
          </div>
          <p><b>Edad:</b> ${patient.edad}</p>
          <p><b>Historial:</b> ${escapeHtml(patient.historialMedico || 'Sin datos')}</p>
        </article>
      `;
    }

    function analysisCard(analysis) {
      const paciente = state.pacientes.find((p) => p.id === analysis.pacienteId);

      return `
        <article class="item-card">
          <div class="item-top">
            <strong>${escapeHtml(paciente ? paciente.nombre : 'Paciente no encontrado')}</strong>
            <span class="badge">Análisis ${analysis.id}</span>
          </div>
          <p><b>Fecha:</b> ${escapeHtml(analysis.fechaAnalisis || '')}</p>
          <p><b>Medidas:</b> ${escapeHtml(analysis.medidas || 'Sin medidas')}</p>
          <p><b>Resultados:</b> ${escapeHtml(analysis.resultados || 'Sin resultados')}</p>
        </article>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function loadData() {
      state.pacientes = await db.pacientes.toArray();
      state.discrepancias = await db.discrepancias.toArray();

      updateCounters();
      renderPatientOptions();
      renderPatientList();
      renderAnalysisList();
    }

    function updateCounters() {
      document.querySelector('#count-pacientes').textContent = state.pacientes.length;
      document.querySelector('#count-analisis').textContent = state.discrepancias.length;
    }

    function renderPatientOptions() {
      const select = document.querySelector('#pacienteSelect');

      const options = state.pacientes
        .map((p) => `<option value="${p.id}">${escapeHtml(p.nombre)} · ID ${p.id}</option>`)
        .join('');

      select.innerHTML = `
        <option value="">Selecciona un paciente</option>
        ${options}
      `;
    }

    function renderPatientList() {
      const container = document.querySelector('#patientsList');

      if (!state.pacientes.length) {
        container.innerHTML = '<p class="empty">Aún no hay pacientes registrados.</p>';
        return;
      }

      container.innerHTML = state.pacientes.map(patientCard).join('');
    }

    function renderAnalysisList() {
      const container = document.querySelector('#analysisList');

      if (!state.discrepancias.length) {
        container.innerHTML = '<p class="empty">Aún no hay análisis registrados.</p>';
        return;
      }

      container.innerHTML = state.discrepancias.map(analysisCard).join('');
    }

    function bindEvents() {
      const patientForm = document.querySelector('#patientForm');
      const analysisForm = document.querySelector('#analysisForm');
      const seedBtn = document.querySelector('#seedBtn');

      patientForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const formData = new FormData(patientForm);

        const nombre = formData.get('nombre')?.toString().trim();
        const edad = Number(formData.get('edad'));
        const historialMedico = formData.get('historialMedico')?.toString().trim();

        if (!nombre || Number.isNaN(edad)) return;

        await db.pacientes.add({
          nombre,
          edad,
          historialMedico
        });

        patientForm.reset();
        await loadData();
      });

      analysisForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const formData = new FormData(analysisForm);

        const pacienteId = Number(formData.get('pacienteId'));
        const fechaAnalisis = formData.get('fechaAnalisis')?.toString();
        const medidas = formData.get('medidas')?.toString().trim();
        const resultados = formData.get('resultados')?.toString().trim();

        if (!pacienteId || !fechaAnalisis) return;

        await db.discrepancias.add({
          pacienteId,
          fechaAnalisis,
          medidas,
          resultados
        });

        analysisForm.reset();
        await loadData();
      });

      seedBtn.addEventListener('click', async () => {
        const totalPacientes = await db.pacientes.count();

        if (totalPacientes > 0) return;

        const pacienteId = await db.pacientes.add({
          nombre: 'Paciente Demo',
          edad: 31,
          historialMedico: 'Control ortodóntico y revisión periodontal anual'
        });

        await db.discrepancias.add({
          pacienteId,
          fechaAnalisis: new Date().toISOString().slice(0, 10),
          medidas: '{"superior": 93.4, "inferior": 89.2}',
          resultados: 'Discrepancia moderada. Se recomienda seguimiento clínico.'
        });

        await loadData();
      });
    }

    renderApp();
    loadData();
  </script>
</body>
</html>
