<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión Dental | Dexie + Vite</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
    .note { background: #eef6ff; padding: 1rem; border-left: 4px solid #3b82f6; border-radius: 6px; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>🦷 App Clínica Dental</h1>
  <p>Los datos se guardan en <code>IndexedDB</code> mediante <strong>Dexie.js</strong>.</p>
  <div class="note">
    <strong>🔍 Cómo probar la persistencia:</strong><br/>
    1. Abre la consola del navegador (<code>F12</code> o <code>Ctrl+Shift+J</code>).<br/>
    2. Verás los registros insertados.<br/>
    3. Recarga la página. Los datos <strong>se mantienen</strong> y la app detecta que ya están inicializados.
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
